<section *ngIf="board() as board" class="game-container">
  <!-- FIX HEADER BAR -->
  <div class="game-header">
    <div class="player-info">
      <span>
        Current player:
        <strong>{{ board.currentPlayer }}</strong>
      </span>

      <span *ngIf="ui.isMyTurn()" class="badge"> Your turn </span>

      <span *ngIf="ui.isWaiting()" class="waiting-text">
        Waiting for opponent...
      </span>
    </div>

    <!-- DICE ALWAYS PRESENT -->
    <div class="dice-container">
      <app-dice [dice]="dice()" />
    </div>
  </div>

  <!-- BOARD + CUBE LAYOUT -->
  <div class="board-wrapper">
    <!-- LEFT PANEL (Doubling Cube) -->
    <div class="cube-wrapper">
      <app-doubling-cube
        [value]="doublingCubeValue()"
        [owner]="doublingCubeOwner()"
        [enabled]="doublingCubeEnabled()"
      ></app-doubling-cube>
    </div>

    <!-- BOARD -->
    <app-board
      [board]="board"
      [clickablePoints]="clickablePoints()"
      [targetPoints]="targetPoints()"
      [selectedPoint]="selectedPoint()"
      [enabled]="ui.canInteract()"
      (pointClick)="onPointClick($event)"
      (barClick)="onBarClick($event)"
    >
    </app-board>
  </div>

  <!-- ERROR -->
  <div *ngIf="ui.error()" class="error-box">
    {{ ui.error() }}
  </div>

  <!-- MODALS -->
  <app-turn-action-modal
    *ngIf="ui.showActionModal()"
    [canRoll]="ui.canRoll()"
    [canDouble]="ui.canOfferDouble()"
    [canRespond]="ui.canRespondToDouble()"
    (roll)="rollDice()"
    (offerDouble)="offerDouble()"
    (accept)="acceptDouble()"
    (decline)="declineDouble()"
  >
  </app-turn-action-modal>

  <app-game-finished-modal
    *ngIf="ui.isGameFinished()"
    [winnerPlayerId]="store.snapshot()?.winnerPlayerId ?? null"
    [localPlayerId]="store.localPlayerId() ?? null"
    [resultType]="store.snapshot()?.resultType ?? null"
    [finishReason]="store.snapshot()?.finishReason ?? null"
    [awardedPoints]="store.snapshot()?.awardedPoints ?? null"
  >
  </app-game-finished-modal>

  <!-- ACTIONS -->
  <div class="actions">
    <button (click)="undoMove()" [disabled]="!ui.canUndo()">Undo</button>

    <button
      class="primary"
      (click)="onTurnFinished()"
      [disabled]="!ui.canSubmitTurn()"
    >
      Submit Turn
    </button>
  </div>
</section>
