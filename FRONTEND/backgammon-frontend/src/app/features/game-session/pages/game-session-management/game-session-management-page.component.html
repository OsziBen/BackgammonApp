<h1>Game Session</h1>

<div *ngIf="loading$ | async">Loading...</div>

<div *ngIf="error$ | async as error" style="color: red">
  {{ error }}
</div>

<!-- nincs aktív session -->
<app-create-game-session
  *ngIf="!(activeSession$ | async) && !(loading$ | async)"
  (sessionCreated)="onSessionCreated($event)"
></app-create-game-session>

<!-- VAN aktív session -->
<app-active-game-session
  *ngIf="activeSession$ | async as activeSession"
  [session]="activeSession"
  (delete)="onDeleteSession($event)"
></app-active-game-session>
