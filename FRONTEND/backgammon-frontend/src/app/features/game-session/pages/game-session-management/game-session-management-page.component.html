<h1>Game Session</h1>

<div *ngIf="loading()">Loading...</div>

<div *ngIf="error()" style="color: red">
  {{ error() }}
</div>

<!-- <div>
  <app-join-game-session></app-join-game-session>

  <app-session-waiting-room></app-session-waiting-room>
</div> -->

<!-- nincs aktív session -->
<app-create-game-session
  *ngIf="!activeSession() && !loading()"
  (sessionCreated)="onSessionCreated($event)"
></app-create-game-session>

<!-- VAN aktív session -->
<app-active-game-session
  *ngIf="activeSession()"
  [session]="activeSession()!"
  (deleteSession)="onDeleteSession($event)"
>
</app-active-game-session>
