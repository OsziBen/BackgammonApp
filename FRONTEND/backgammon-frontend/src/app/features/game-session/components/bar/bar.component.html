<div class="bar">
  <!-- TOP (BLACK) -->
  <div class="bar-section top">
    <app-point
      class="bar-point"
      [point]="blackPoint"
      [top]="true"
      [clickable]="isClickable()"
      [target]="isTarget()"
      [selected]="isSelected()"
      (pointClick)="onPointClick($event)"
    ></app-point>
  </div>

  <!-- BOTTOM (WHITE) -->
  <div class="bar-section bottom">
    <app-point
      class="bar-point"
      [point]="whitePoint"
      [top]="false"
      [clickable]="isClickable()"
      [target]="isTarget()"
      [selected]="isSelected()"
      (pointClick)="onPointClick($event)"
    ></app-point>
  </div>
</div>
