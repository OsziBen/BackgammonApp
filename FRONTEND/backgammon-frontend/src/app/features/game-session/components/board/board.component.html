<div class="board">
  <!-- Bal oldal -->
  <div class="board-half left">
    <div class="quarter top">
      <div class="points">
        <app-point
          *ngFor="let point of topLeft(); let i = index"
          [point]="point"
          [top]="true"
          [clickable]="isClickable(point.index)"
          [target]="isTarget(point.index)"
          [selected]="isSelected(point.index)"
          (pointClick)="pointClick.emit($event)"
        ></app-point>
      </div>
    </div>

    <div class="quarter bottom">
      <div class="points">
        <app-point
          *ngFor="let point of bottomLeft(); let i = index"
          [point]="point"
          [top]="false"
          [clickable]="isClickable(point.index)"
          [target]="isTarget(point.index)"
          [selected]="isSelected(point.index)"
          (pointClick)="pointClick.emit($event)"
        ></app-point>
      </div>
    </div>
  </div>

  <!-- Middle bar -->
  <div class="middle-bar">
    <app-bar
      [barWhite]="board.bar[PlayerColor.White]"
      [barBlack]="board.bar[PlayerColor.Black]"
      [clickablePoints]="clickablePoints"
      [targetPoints]="targetPoints"
      [selectedPoint]="selectedPoint"
      [enabled]="enabled"
      (pointClick)="pointClick.emit($event)"
    ></app-bar>
  </div>

  <!-- Jobb oldal -->
  <div class="board-half right">
    <div class="quarter top">
      <div class="points">
        <app-point
          *ngFor="let point of topRight(); let i = index"
          [point]="point"
          [top]="true"
          [clickable]="isClickable(point.index)"
          [target]="isTarget(point.index)"
          [selected]="isSelected(point.index)"
          (pointClick)="pointClick.emit($event)"
        ></app-point>
      </div>
    </div>

    <div class="quarter bottom">
      <div class="points">
        <app-point
          *ngFor="let point of bottomRight(); let i = index"
          [point]="point"
          [top]="false"
          [clickable]="isClickable(point.index)"
          [target]="isTarget(point.index)"
          [selected]="isSelected(point.index)"
          (pointClick)="pointClick.emit($event)"
        ></app-point>
      </div>
    </div>
  </div>

  <!-- Off point a board jobb szélén -->
  <div
    class="off-point"
    [class.clickable]="enabled && hasSelection()"
    (click)="pointClick.emit(OFF)"
  >
    <!-- Fekete off -->
    <div class="off-section top">
      <div *ngIf="board.off[PlayerColor.White] > 0" class="off-counter white">
        {{ board.off[PlayerColor.White] }}
      </div>
    </div>

    <!-- Fehér off -->
    <div class="off-section bottom">
      <div *ngIf="board.off[PlayerColor.Black] > 0" class="off-counter black">
        {{ board.off[PlayerColor.Black] }}
      </div>
    </div>
  </div>

  <!-- Disabled overlay -->
  <div *ngIf="!enabled" class="board-overlay">
    <div class="overlay-content">Opponent's turn</div>
  </div>
</div>
