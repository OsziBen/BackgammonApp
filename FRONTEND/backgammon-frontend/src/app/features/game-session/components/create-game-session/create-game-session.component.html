<div class="form-title">Create Game Session</div>

<form [formGroup]="form" class="form-grid">
  <input
    type="number"
    placeholder="Target points"
    formControlName="targetPoints"
  />

  <label class="checkbox">
    <input type="checkbox" formControlName="doublingCubeEnabled" />
    Doubling cube enabled
  </label>

  <label class="checkbox">
    <input type="checkbox" formControlName="clockEnabled" />
    Clock enabled
  </label>

  <input
    type="number"
    placeholder="Match time (seconds)"
    formControlName="matchTimePerPlayerInSeconds"
  />

  <input
    type="number"
    placeholder="Turn delay (seconds)"
    formControlName="startOfTurnDelayPerPlayerInSeconds"
  />

  <label class="checkbox">
    <input type="checkbox" formControlName="crawfordRuleEnabled" />
    Crawford rule enabled
  </label>

  <button type="button" (click)="create()">Create session</button>
</form>
