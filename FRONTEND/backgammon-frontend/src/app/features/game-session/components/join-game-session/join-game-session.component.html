<div class="card-section">
  <div class="section-title">Join Session</div>

  <div *ngIf="store.error()" class="error-box">
    {{ store.error() }}
  </div>

  <form [formGroup]="form" (ngSubmit)="onJoin()" class="form-grid">
    <input
      type="text"
      placeholder="Session code"
      formControlName="sessionCode"
    />

    <button
      type="submit"
      [disabled]="form.get('sessionCode')?.invalid || isLoading()"
    >
      {{ isLoading() ? 'Joining...' : 'Join session' }}
    </button>
  </form>
</div>
