<h2 class="section-title">All Groups</h2>

<div *ngIf="loading()" class="info-text">Loading groups...</div>

<div *ngIf="error()" class="error-box">{{ error() }}</div>

<div *ngIf="!loading() && !error()" class="card-grid">
  @for (group of groups(); track group.id) {
    <app-group-card [group]="group" (join)="onJoin($event)" />
  }
</div>
