<h3 class="section-title">Members</h3>

@if (!loading() && membersResponse()) {
  <p class="info-text">
    Moderators: {{ currentModerators() }} / {{ maxModerators() }}
  </p>

  <p class="info-text">Members: {{ currentMembers() }} / {{ maxMembers() }}</p>
}

<app-group-members-add [canAdd]="canAddMembers()" (add)="onAddMember($event)">
</app-group-members-add>

@if (loading()) {
  <p class="info-text">Loading members...</p>
}

@if (!loading()) {
  <div class="card-grid">
    @for (m of members(); track trackById($index, m)) {
      <app-group-member-card
        [member]="m"
        [isOwner]="isOwner()"
        [canManage]="canManageMembers()"
        (promote)="onPromote($event)"
        (demote)="onDemote($event)"
        (remove)="onRemove($event)"
      />
    }
  </div>
}
