<h3 class="section-title">Join Requests</h3>

<div class="card-grid">
  @for (r of [1, 2, 3]; track r) {
    <div class="card-item">
      <p>
        <strong>User {{ r }}</strong>
      </p>
      <p>Status: Pending</p>
    </div>
  }
</div>

<div *ngIf="role !== 'Member'" class="actions">
  <button>Approve</button>
  <button class="danger">Reject</button>
</div>
