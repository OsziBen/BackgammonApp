<div class="page-header">
  <button class="back-button" [routerLink]="['/groups', group.id, 'overview']">
    ← Back
  </button>

  <h2 class="section-title">Edit Group</h2>
</div>

<form class="edit-form" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label>Name</label>

    <input type="text" formControlName="name" />
  </div>

  <div class="form-group">
    <label>Description</label>

    <textarea rows="5" formControlName="description"></textarea>
  </div>

  <div class="grid">
    <div class="form-group">
      <label>Visibility</label>

      <select formControlName="visibility">
        @for (v of visibilityOptions; track v) {
          <option [value]="v">{{ v }}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label>Size Preset</label>

      <select formControlName="sizePreset">
        @for (s of sizePresetOptions; track s) {
          <option [value]="s">{{ s }}</option>
        }
      </select>
    </div>
  </div>

  <div class="actions">
    <button type="submit" [disabled]="loading()">Save Changes</button>
  </div>
</form>
