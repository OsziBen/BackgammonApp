<h2 class="section-title">My Tournaments</h2>

<div *ngIf="loading()" class="info-text">Loading tournaments...</div>
<div *ngIf="error()" class="error-box">{{ error() }}</div>

<div *ngIf="!loading() && !error()" class="card-grid">
  <app-tournament-card
    *ngFor="let tournament of tournaments(); trackBy: trackById"
    [tournament]="tournament"
  />
</div>
