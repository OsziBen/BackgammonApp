<h3 class="section-title">Participants</h3>

<div class="card-grid">
  @for (p of [1, 2, 3, 4, 5, 6, 7, 8]; track p) {
    <div class="card-item">
      <p>
        <strong>Player {{ p }}</strong>
      </p>
      <p class="muted">Score: {{ 100 - p * 5 }}</p>
    </div>
  }
</div>

<div class="actions">
  <button>Add Participant</button>
  <button>Remove</button>
  <button>Seed</button>
</div>
