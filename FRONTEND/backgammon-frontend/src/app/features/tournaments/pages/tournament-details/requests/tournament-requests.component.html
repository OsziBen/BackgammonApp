<h3 class="section-title">Join Requests</h3>

@if (loading()) {
  <p class="info-text">Loading requests...</p>
}

@if (error()) {
  <div class="error-box">
    {{ error() }}
  </div>
}

@if (!loading() && !error()) {
  <div class="card-grid">
    @for (request of requests(); track request.id) {
      <app-tournament-join-request-card
        [request]="request"
        [canManage]="canManageRequests()"
        (approve)="onApprove($event)"
        (reject)="onReject($event)"
      />
    }
  </div>
}
